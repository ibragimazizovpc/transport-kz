<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Редактировать объявление</title>
<link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="header">
<h1>Kolesa Clone</h1>
</div>

<div class="container">

<div class="form-box">
<h2>Редактировать объявление</h2>

<form action="/update/{{ ad.id }}" method="post">

<input type="text" name="title" value="{{ ad.title }}" required>

<input type="text" name="price" value="{{ ad.price }}" required>

<input type="text" name="year" value="{{ ad.year }}" required>

<input type="text" name="city" value="{{ ad.city }}" required>

<input type="text" name="phone" value="{{ ad.phone }}" required>

<input type="text" name="description" value="{{ ad.description }}" required>

<button type="submit">Сохранить изменения</button>

</form>

<a href="/car/{{ ad.id }}" class="back-link">← Назад к объявлению</a>

</div>

</div>

</body>
</html>
